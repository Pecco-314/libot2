<!DOCTYPE html>
<html>
<head>
    <title>登录 - 监控面板</title>
    <style>
        body { background-color: #1e1e1e; color: #d4d4d4; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        input[type="password"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #444; border-radius: 4px; background: #1e1e1e; color: white; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>系统登录</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="请输入密码" required autofocus>
            <button type="submit">登 录</button>
        </form>
    </div>
</body>
</html>
