<!DOCTYPE html>
<html>

<head>
    <title>Monitor Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #ccc;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 220px;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }

        .nav-item.active {
            background: #37373d;
            border-left: 3px solid #007acc;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 10px 20px;
            background: #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #log-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
        }

        .log-row {
            display: flex;
            gap: 10px;
            padding: 3px 0;
            border-bottom: 1px solid #222;
            position: relative;
        }

        .log-time {
            color: #666;
            white-space: nowrap;
        }

        .log-level {
            width: 60px;
            text-align: center;
            border-radius: 2px;
        }

        .log-msg {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            padding-right: 10px;
        }

        .log-msg.expanded {
            white-space: pre-wrap;
            word-break: break-all;
            overflow: visible;
        }

        .log-msg:hover::after {
            content: " (点击展开/折叠)";
            color: #007acc;
            font-size: 10px;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #1a1a1a;
            padding-left: 5px;
        }

        .log-msg.expanded:hover::after {
            content: "";
        }

        .level-ERROR {
            color: #ff5555;
        }

        .level-WARNING {
            color: #ffb86c;
        }

        .level-INFO,
        .level-SUCCESS {
            color: #50fa7b;
        }

        button {
            background: #cc3333;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div style="padding: 15px; font-size: 11px; color: #555;">LOGS</div>
        {% for file in log_files %}
        <div class="nav-item {% if loop.first %}active{% endif %}" onclick="loadLog('{{ file }}', this)">{{ file }}
        </div>
        {% endfor %}

        <div style="margin-top: auto; border-top: 1px solid #333;">
            <div class="nav-item" onclick="showPwdPanel(this)">🔑 修改密码</div>
            <a href="/logout" class="nav-item" style="text-decoration: none; display: block; color: inherit;">🚪
                退出登录</a>
        </div>
    </div>

    <div id="main">
        <div id="log-view" style="display: flex; flex-direction: column; height: 100%;">
            <div class="header">
                <span id="cur-title">加载中...</span>
                <button id="restart-btn" onclick="triggerRestart()"
                    style="background: #cc3333; color: white; border: none; padding: 5px 10px; cursor: pointer;">重启服务</button>
            </div>
            <div id="log-container"></div>
        </div>

        <div id="pwd-view" style="display: none; padding: 30px;">
            <h2 style="margin-top: 0; font-weight: normal;">修改访问密码</h2>
            <div style="margin-bottom: 15px;">
                <input type="password" id="new_pwd" placeholder="输入新密码"
                    style="padding: 10px; width: 250px; background: #000; border: 1px solid #444; color: white; border-radius: 3px;">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="password" id="confirm_pwd" placeholder="再次确认新密码"
                    style="padding: 10px; width: 250px; background: #000; border: 1px solid #444; color: white; border-radius: 3px;">
            </div>
            <button onclick="submitPassword()"
                style="background: #007acc; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 3px;">确认修改</button>
        </div>
    </div>

    <script>
        const socket = io();
        const container = document.getElementById('log-container');

        let currentFile = '';
        let currentOffset = 0;
        let isLoading = false;
        let hasMore = true;
        const LIMIT = 100;

        socket.on('log_event', (log) => {
            if (log.filename === currentFile) {
                const isAtBottom = (container.scrollHeight - container.scrollTop - container.clientHeight) < 10;
                container.appendChild(createLogRowElement(log));
                currentOffset++;

                if (isAtBottom) {
                    container.scrollTop = container.scrollHeight;
                }
            }
        });

        socket.on('system_msg', (msg) => alert(msg.data));

        function loadLog(file, el) {
            document.getElementById('pwd-view').style.display = 'none';
            document.getElementById('log-view').style.display = 'flex';

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');

            currentFile = file;
            document.getElementById('cur-title').innerText = file;

            const serviceName = file.replace('.log', '');
            const restartBtn = document.getElementById('restart-btn');

            // 更新按钮文字和绑定的服务名
            restartBtn.innerText = `重启 ${serviceName}`;
            restartBtn.dataset.service = serviceName;

            if (serviceName === 'web') {
                restartBtn.disabled = true;
                restartBtn.style.opacity = '0.5';
                restartBtn.style.cursor = 'not-allowed';
            } else {
                restartBtn.disabled = false;
                restartBtn.style.opacity = '1';
                restartBtn.style.cursor = 'pointer';
            }

            currentOffset = 0;
            hasMore = true;
            container.innerHTML = '';

            fetchOlderLogs(true);
        }

        function showPwdPanel(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('log-view').style.display = 'none';
            document.getElementById('pwd-view').style.display = 'block';
        }

        function submitPassword() {
            const newPwd = document.getElementById('new_pwd').value;
            const confirmPwd = document.getElementById('confirm_pwd').value;

            if (!newPwd) return alert("密码不能为空");
            if (newPwd !== confirmPwd) return alert("两次输入的密码不一致");

            fetch('/api/change_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_password: newPwd, confirm_password: confirmPwd })
            })
                .then(res => {
                    if (res.status === 401) {
                        alert("登录已过期，请重新登录");
                        window.location.href = '/login';
                        return;
                    }
                    return res.json();
                })
                .then(data => {
                    if (!data) return;
                    alert(data.msg);
                    if (data.success) {
                        document.getElementById('new_pwd').value = '';
                        document.getElementById('confirm_pwd').value = '';
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("提交失败，请检查网络或控制台日志");
                });
        }

        function fetchOlderLogs(isInitial = false) {
            if (isLoading || !hasMore) return;
            isLoading = true;

            const loadingHint = document.createElement('div');
            loadingHint.style.cssText = "text-align: center; color: #666; padding: 10px; font-size: 12px;";
            loadingHint.innerText = "正在加载更早的日志...";
            container.prepend(loadingHint);

            fetch(`/api/logs/${currentFile}?offset=${currentOffset}&limit=${LIMIT}`)
                .then(r => r.json())
                .then(data => {
                    loadingHint.remove();

                    if (data.length === 0) {
                        hasMore = false;
                        isLoading = false;

                        const endHint = document.createElement('div');
                        endHint.style.cssText = "text-align: center; color: #555; padding: 10px; font-size: 12px;";
                        endHint.innerText = "--- 已经是第一条日志了 ---";
                        container.prepend(endHint);
                        return;
                    }

                    const oldScrollHeight = container.scrollHeight;
                    const fragment = document.createDocumentFragment();
                    data.forEach(log => {
                        fragment.appendChild(createLogRowElement(log));
                    });
                    container.prepend(fragment);

                    currentOffset += data.length;

                    if (isInitial) {
                        container.scrollTop = container.scrollHeight;
                    } else {
                        container.scrollTop = container.scrollHeight - oldScrollHeight;
                    }

                    if (data.length < LIMIT) {
                        hasMore = false;
                    }

                    isLoading = false;
                });
        }

        function createLogRowElement(log) {
            const row = document.createElement('div');
            row.className = 'log-row';
            row.innerHTML = `
            <div class="log-time">${log.timestamp}</div>
            <div class="log-level level-${log.level}">${log.level}</div>
            <div class="log-msg" onclick="this.classList.toggle('expanded')">${escape(log.message)}</div>
        `;
            return row;
        }

        container.addEventListener('scroll', () => {
            if (container.scrollTop === 0) {
                fetchOlderLogs();
            }
        });

        function escape(s) {
            let t = document.createElement('div');
            t.textContent = s;
            return t.innerHTML;
        }

        function triggerRestart() {
            const serviceName = document.getElementById('restart-btn').dataset.service;
            if (confirm(`确定要执行 libotctl restart ${serviceName} 吗？`)) {
                socket.emit('restart_service', { service: serviceName });
            }
        }

        window.onload = () => {
            const activeTab = document.querySelector('.nav-item.active');
            if (activeTab) {
                activeTab.click();
            }
        };
    </script>
</body>

</html>
